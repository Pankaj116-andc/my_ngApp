<p>for-loop works!</p>

<div>
    <ul>
        @for(user of users(); track user){
            <li>{{user}}</li>
        }
    </ul><hr>
    <ul>
        @for(user of usersData(); track user.id){
           <li [style.background-color]="$even?'#ccc':'#fff'">
            <span>{{user.id}} {{user.name + " " + user.surname}}</span>
           </li>
        }
    </ul>
    <hr>
    <form action="">
    <select name="" id="" (change)="onRoleChange($event)">
        <option value="Guest">Guest</option>
        <option value="Admin">Admin</option>
        <option value="Super Admin">Super Admin</option>
    </select>
</form>
</div>
