<p>counter works!</p>
<div class="countDiv">
    <h1 style="margin-left: 115px; color: royalblue;">Counter App</h1>
    <h1  style="margin-left: 200px; color: rgb(19, 82, 107);">{{count()}}</h1>
    
    <div class="btnDiv">
        <button (click)="handleDec()" class="btn" id="btn1"><h2>-</h2></button>
        <button (click)="handleReset()" class="btn" id="btn2"><h2>Reset</h2></button>
        <button (click)="handleInc()" class="btn" id="btn3"><h2>+</h2></button>
    </div>
</div>
