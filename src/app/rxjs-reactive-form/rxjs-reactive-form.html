<p>rxjs-reactive-form works!</p>
<h1>RXJS in Reactive Form</h1>
<input type="text" [formControl] = "searchControl" id="">
<form [formGroup]="userForm" (ngSubmit)="onSubmit()">
    <input type="text" formControlName ="name" placeholder="Enter Name">
    <input type="checkbox" formControlName ="subscribe" >
    <label for="">Subscribe for Newsletter</label><br>
    <input type="text" formControlName ="email" placeholder="Enter Email"><br>
    <input type="password" formControlName ="password" placeholder="Enter Password">
    <input type="password" formControlName ="confirmPassword" placeholder="Enter Confirm Password"><br>
    <div *ngIf="passwordMismatch">
        <h3>passwords do not match</h3>
    </div>
    <input type="number" formControlName ="age" placeholder="Enter Age">
    <input type="text" formControlName ="drivingLicense" placeholder="Enter Driving License">
    <select formControlName ="country" id="">
        <option value="Select Country">Select Country</option>
        <option value="India">India</option>
        <option value="Nepal">Nepal</option>
        <option value="Bhutan">Bhutan</option>
        <option value="Indonesia">Indonesia</option>
    </select>
    <input type="text" formControlName ="currency" placeholder="Currency" name="" id="">
    <input type="text" formControlName ="search" placeholder="Search" name="" id="">
    <button>Submit</button>
</form>
