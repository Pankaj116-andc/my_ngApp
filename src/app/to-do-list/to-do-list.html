<p>to-do-list works!</p>
<h1>To-Do-List</h1>
<input type="text" [(ngModel)]="task" placeholder="Enter Task">
<button (click)="addTask()">Add Task</button>

@for (task of taskList; track task.id) {
<ul class="taskList">
    <li>{{task.id}}</li>
    <li>{{task.task}}</li>
    <li><button (click)="deleteTask(task.id,task.task)">Delete</button></li>
</ul>
}
