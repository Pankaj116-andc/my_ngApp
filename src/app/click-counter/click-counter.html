<p>click-counter works!</p>
<h1>Click Counter</h1>
<h2 
style="display: flex;
justify-content: center; 
">{{count()}}</h2>
<div class="btnBox">
    <button class="btn" (click)="decrement()">Dec</button>
    <button class="btn" (click)="reset()">Res</button>
    <button class="btn" (click)="increment()">Inc</button>
</div>
